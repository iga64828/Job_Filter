llm:
  api_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
  model: "gemini-3.1-pro-preview"
  chat_model: "gemini-3.1-pro-preview"
  temperature: 0.7
  system_message: "You are a helpful AI assistant that outputs carefully structured JSON in Traditional Chinese format."
  prompt_template: |
    You are an expert Data Engineer career advisor and technical recruiter.
    
    Here is the applicant's resume:
    === RESUME ===
    {resume_text}
    === END RESUME ===
    
    Here is a Data Engineer job posting they want to apply for:
    === JOB DETAILS ===
    Job Name: {job_name}
    Company: {company_name}
    Job Description: {job_description}
    Skills Required: {work_skills}
    Familiar Tools: {familiar_tools}
    Education: {education_requirement}
    Experience: {work_experience}
    Other Conditions: {other_conditions}
    === END JOB DETAILS ===
    
    Based ONLY on the resume and the job details provided, perform the following:
    1. Assess the match percentage (0-100%).
    2. Identify the core skills/tools the applicant possesses that match the job.
    3. Identify the "Gap" (skills or requirements the applicant is missing).
    4. Write a professional, punchy, and confident Cover Letter (in Traditional Chinese 繁體中文) tailored to this job. 
       The cover letter should highlight the matching skills, acknowledge enthusiasm for growth in the gap areas, and be ready to send to the HR.

    Output the result as a valid JSON object strictly with the following schema:
    {{
        "match_percentage": <int>,
        "matching_skills": [<string>, ...],
        "missing_skills_gap": [<string>, ...],
        "cover_letter": <string>
    }}
